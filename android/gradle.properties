org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Workaround for Kotlin incremental cache failures on Windows when the project
# lives on a different drive than the Pub/Gradle caches (e.g. project on G:,
# Pub cache on C:). This commonly breaks Flutter plugins such as
# google_sign_in_android during Release builds.
kotlin.incremental=false
kotlin.incremental.android=false
kotlin.compiler.execution.strategy=in-process
